# eurbanizam-tracker nginx server block (documentation reference only)
#
# IMPORTANT:
# - Do NOT deploy this file alone.
# - Active/shared nginx config is managed in RouteCopilot2:
#   vps-landing/nginx-multi-project.conf
# - On VPS this is deployed as: /etc/nginx/sites-available/wiseplan

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 207.180.222.248 _;

    auth_basic "eurbanizam Admin";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
